{% extends "base.html" %}
{% block title %}Update Daily Time{% endblock %}
{% block content %}

<div class="dashboard-container" style="display: flex; justify-content: center; padding-top: 2rem;">
    <div class="card-duo" style="max-width: 500px; width: 100%; border-top: 6px solid var(--primary);">
        <div class="card-header" style="margin-bottom: 1.5rem;">
            <h2><i class="fas fa-edit"></i> Edit Daily Time</h2>
        </div>

        <form action="" method="post" class="duo-form" style="margin-bottom: 1.5rem;">
            {% csrf_token %}
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; color: var(--ink);">Date</label>
                <input type="date" name="date" class="duo-input" required value="{{ date }}">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; color: var(--ink);">Duration (Hours)</label>
                <input type="number" name="duration" step="0.01" class="duo-input" required value="{{ data.duration }}">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 800; margin-bottom: 0.5rem; color: var(--ink);">Subject (Optional)</label>
                <select name="subject" class="duo-input">
                    <option value="">-- No specific subject --</option>
                    {% for sub in subjects %}
                    <option value="{{ sub.id }}" {% if data.subject and data.subject.id == sub.id %}selected{% endif %}>
                        {{ sub.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <a href="/time/" style="text-decoration: none; width: 50%;">
                    <button type="button" class="btn-duo btn-duo-secondary" style="width: 100%;">Cancel</button>
                </a>
                <button type="submit" class="btn-duo" style="width: 50%;">Update</button>
            </div>
        </form>

        <hr style="border: 1px solid var(--border); margin: 1.5rem 0;">

        <form action="/time/delete/{{data.id}}/" method="post">
            {% csrf_token %}
            <button type="submit" class="btn-duo" style="width: 100%; background: var(--danger); border-bottom-color: #c92a2a;">
                <i class="fas fa-trash"></i> Delete Entry
            </button>
        </form>
    </div>
</div>

<style>
    .duo-input {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface-1);
        color: var(--ink);
        font-family: inherit;
        font-weight: 600;
        transition: all 0.2s ease;
    }
    
    .duo-input:focus {
        outline: none;
        border-color: var(--primary);
        background: var(--canvas);
    }
</style>

{% endblock content %}
