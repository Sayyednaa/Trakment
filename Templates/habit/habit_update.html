{% extends "base.html" %}

{% block title %}Update Entry | {{habit.name}}{% endblock title %}

{% block content %}
<link rel="stylesheet" href="/static/css/style.css">

<div class="container py-5 d-flex justify-content-center">
    <div class="card-duo w-100" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h2 style="font-weight: 900; color: var(--ink);"><i class="fas fa-edit text-primary"></i> Update {{habit.name}} Entry</h2>
            <p style="color: var(--ink-muted); font-weight: 600;">Edit or remove your habit entry.</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="date" class="form-label fw-bold">Date</label>
                <input type="date" class="duo-input" id="date" name="date" value="{{today}}" max="{{today}}" required>
            </div>
            
            <div class="d-flex gap-3 mt-5">
                <a href="{% url 'habit_delete' habit.id entry.id %}" class="btn-duo btn-duo-danger w-50 text-center text-decoration-none py-3">Delete</a>
                <button type="submit" class="btn-duo btn-duo-primary w-50 py-3">Update Entry</button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
