{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center mt-5">
    <div class="card clean-card mx-auto" style="max-width: 500px;">
        <div class="card-body p-5">
            <i class="fas fa-ban text-danger mb-4" style="font-size: 4rem;"></i>
            <h2 class="fw-bold mb-3">Account Suspended</h2>
            <p class="text-muted fw-bold mb-4">
                Your account has been temporarily blocked by an administrator due to a violation of our terms of service.
            </p>
            <div class="alert alert-danger fw-bold">
                Blocked until: {{ blocked_until|date:"M d, Y H:i" }}
            </div>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary mt-3">Return to Home</a>
        </div>
    </div>
</div>
{% endblock %}
