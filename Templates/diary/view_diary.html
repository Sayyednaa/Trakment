{% extends "base.html" %}
{% block title %}{{diary.date}} - Diary{% endblock title %}
{% block content %}

{% if diary %}
<div class="py-5" style="max-width: 700px; margin: 0 auto;">
    <div class="card-duo p-5 text-center">
        <h2 class="mb-4" style="font-weight: 900; color: var(--ink);"><i class="fas fa-book-open me-2" style="color: var(--primary);"></i>{{diary.date}}</h2>
        <p class="mb-5" style="font-size: 1.15rem; font-weight: 700; color: var(--ink); line-height: 1.6; text-align: left; background: var(--surface-1); padding: 1.5rem; border: 2px solid var(--border); border-radius: var(--radius-md);">
            {{diary.content}}
        </p>
        <a href="/diary/delete/{{diary.id}}" class="btn-duo btn-duo-danger px-5" data-confirm="Are you sure you want to delete this diary entry?" data-confirm-title="Confirm Delete"><i class="fas fa-trash me-2"></i>Delete Entry</a>
    </div>
</div>
{% else %}
<div class="py-5 text-center">
    <div class="card-duo p-5 d-inline-block">
        <h2 class="text-muted mb-0">No Diary Entry Found</h2>
    </div>
</div>
{% endif %}

{% endblock content %}
